name: Do this when you update the watchlist /Warm Strategy Cache (run once)
# Do this Manually when new tickers are added. To be sure delete the file data/strategy_cache where the strategy per ticker is stored

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: investo-warm-strategy-cache
  cancel-in-progress: true

jobs:
  warm_cache:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install openpyxl

      - name: Prepare folders
        run: |
          mkdir -p data/raw/daily
          mkdir -p data/raw/weekly
          mkdir -p data/strategy_cache

      - name: Prefetch latest data
        run: |
          python scripts/prefetch_data.py \
            --watchlist watchlist.csv \
            --start 2010-01-01 \
            --end $(date +%F) \
            --data-dir data \
            --pause-seconds 0.40 \
            --max-failures 12

      - name: Warm strategy cache (all watchlist tickers)
        run: |
          python scripts/warm_strategy_cache.py \
            --watchlist watchlist.csv \
            --data-dir data \
            --force

      - name: Show cache results
        run: |
          echo "=== strategy_cache files ==="
          ls -la data/strategy_cache/
          echo "=== sample (MSFT) ==="
          cat data/strategy_cache/MSFT.json || true

      - name: Commit cache to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/strategy_cache/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Warm strategy cache — initial run [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Upload cache as artifact
        uses: actions/upload-artifact@v5
        with:
          name: strategy-cache
          path: data/strategy_cache/
          if-no-files-found: warn
