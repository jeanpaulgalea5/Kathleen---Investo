name: Refresh Commodity Targets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 15 * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

permissions:
  contents: write

concurrency:
  group: investo-refresh-commodity-targets
  cancel-in-progress: true

jobs:
  refresh_commodity_targets:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -e .
          pip install pandas requests beautifulsoup4 lxml

      - name: Prepare folders
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p data

      - name: Refresh commodity targets
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/refresh_commodity_targets.py \
            --out data/commodities_targets.csv

      - name: Show refreshed file
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== data/commodities_targets.csv ==="
          cat data/commodities_targets.csv

      - name: Commit refreshed commodity targets
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/commodities_targets.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Refresh commodity targets [skip ci]"
          git push origin "${GITHUB_REF_NAME:-main}"
