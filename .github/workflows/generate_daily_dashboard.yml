name: Generate Daily dashboard

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  daily-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install openpyxl

      - name: Prepare report folders
        run: |
          mkdir -p data/raw/daily
          mkdir -p data/raw/weekly
          mkdir -p data/_prefetch_reports
          mkdir -p reports/latest/daily_dashboard
          mkdir -p reports/archive/daily_dashboard

      - name: Resolve end date (exclusive)
        run: |
          END_EXCLUSIVE=$(python - <<'PY'
          from datetime import datetime, timedelta, timezone
          print((datetime.now(timezone.utc).date() + timedelta(days=1)).isoformat())
          PY
          )
          echo "END_EXCLUSIVE=${END_EXCLUSIVE}" >> "$GITHUB_ENV"
          echo "Using exclusive end date: ${END_EXCLUSIVE}"

      - name: Check required files
        run: |
          echo "=== root files ==="
          ls -la
          echo "=== watchlist ==="
          ls -la watchlist.csv
          echo "=== holdings xlsx ==="
          ls -la Investments.xlsx
          echo "=== scripts ==="
          ls -la scripts

      - name: Prefetch / refresh data (daily + weekly)
        run: |
          python scripts/prefetch_data.py \
            --watchlist watchlist.csv \
            --start 2010-01-01 \
            --end "${END_EXCLUSIVE}" \
            --data-dir data \
            --pause-seconds 0.40 \
            --max-failures 12

      - name: Generate Daily dashboard
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: |
          python scripts/generate_daily_dashboard.py \
            --watchlist watchlist.csv \
            --holdings-xlsx Investments.xlsx \
            --holdings-sheet Transactions \
            --data-dir data \
            --out-dir reports/latest/daily_dashboard \
            --archive-dir reports/archive/daily_dashboard \
            --start 2010-01-01 \
            --end "${END_EXCLUSIVE}" \
            --send-email

      - name: Debug outputs
        run: |
          echo "=== reports/latest/daily_dashboard ==="
          ls -la reports/latest/daily_dashboard || true
          echo "=== reports/archive/daily_dashboard ==="
          ls -la reports/archive/daily_dashboard || true
          echo "=== latest summary ==="
          cat reports/latest/daily_dashboard/daily_dashboard_summary.json || true
          echo "=== prefetch summary ==="
          cat data/_prefetch_reports/prefetch_summary.json || true
          echo "=== prefetch repairs ==="
          cat data/_prefetch_reports/prefetch_repairs.csv || true

      - name: Commit dashboard outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/daily data/raw/weekly data/_prefetch_reports
          git add reports/latest/daily_dashboard
          git add reports/archive/daily_dashboard

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi

          git commit -m "Update Daily dashboard [skip ci]"
          git push
